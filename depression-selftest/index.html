<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Selfscreen — Mental Clarity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #141414;
  --surface3: #1a1a1a;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text-2: #8a8680;
  --text-3: #4a4845;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.12);
  --accent-glow: rgba(200,169,110,0.25);
  --danger: #e06060;
  --danger-dim: rgba(224,96,96,0.12);
  --ok: #6eb5c8;
  --ok-dim: rgba(110,181,200,0.12);
  --radius: 16px;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-ui: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events:none;
  opacity:0.4;
}

/* AMBIENT LIGHT */
.ambient {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 80vw 60vh at 15% 10%, rgba(200,169,110,0.04) 0%, transparent 70%),
              radial-gradient(ellipse 60vw 80vh at 85% 90%, rgba(110,181,200,0.03) 0%, transparent 70%);
}

.app-wrapper {
  position:relative; z-index:1;
  display:grid;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* ============ HEADER ============ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 32px 0 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
  margin-bottom: 40px;
}

.logo-group {
  display:flex; align-items:center; gap:12px;
}

.logo-mark {
  width: 36px; height: 36px;
  border: 1px solid var(--accent);
  border-radius: 8px;
  display:flex; align-items:center; justify-content:center;
  color: var(--accent);
  font-family: var(--font-display);
  font-size: 18px;
  font-style: italic;
}

.logo-text {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo-sub {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-badge {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 99px;
}

/* ============ LAYOUT ============ */
.main-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 24px;
  align-items: start;
}

@media (max-width: 780px) {
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { display:none; }
  .sidebar-mobile { display:flex !important; }
}

/* ============ SIDEBAR ============ */
.sidebar {
  position: sticky;
  top: 24px;
}

.sidebar-label {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 12px;
  padding-left: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 4px;
  transition: all 0.2s ease;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}

.nav-item::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, var(--accent-dim), transparent);
  opacity:0; transition: opacity 0.2s;
}

.nav-item:hover { background: var(--surface2); }
.nav-item.active {
  background: var(--surface2);
  border-color: var(--border-bright);
}
.nav-item.active::before { opacity:1; }

.nav-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display:flex; align-items:center; justify-content:center;
  font-size: 15px;
  background: var(--surface3);
  flex-shrink: 0;
  transition: all 0.2s;
}
.nav-item.active .nav-icon {
  background: var(--accent-dim);
}

.nav-info { flex:1; min-width:0; }
.nav-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  transition: color 0.2s;
}
.nav-item.active .nav-name { color: var(--text); }
.nav-count {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}

.nav-progress-ring {
  width: 28px; height: 28px;
  flex-shrink: 0;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.sidebar-info {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.6;
  padding: 0 2px;
}

/* Mobile tab bar */
.sidebar-mobile {
  display: none;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.mob-tab {
  display:flex; align-items:center; gap:8px;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  transition: all 0.2s;
  flex-shrink:0;
}
.mob-tab.active {
  background: var(--accent-dim);
  border-color: rgba(200,169,110,0.3);
  color: var(--accent);
}

/* ============ MAIN CONTENT ============ */
.content-area {
  min-width: 0;
}

/* Question Card */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

.q-card-header {
  padding: 24px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
}

.q-meta {
  display:flex; flex-direction:column; gap:4px;
}

.q-test-name {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}

.q-pos {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--text);
  line-height: 1;
}

.q-pos span {
  font-size: 16px;
  color: var(--text-3);
}

.q-card-body {
  padding: 32px 28px;
}

.q-number-badge {
  display:inline-flex; align-items:center;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: 16px;
}

.q-text {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1.4;
  color: var(--text);
  margin-bottom: 28px;
  font-weight: 400;
}

@media (max-width: 600px) { .q-text { font-size: 18px; } }

/* Progress bar */
.progress-track {
  height: 3px;
  background: var(--surface3);
  border-radius: 99px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), rgba(200,169,110,0.6));
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
}

/* Answer options */
.options-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}

@media (max-width: 560px) {
  .options-grid { grid-template-columns: repeat(2, 1fr); }
}

.opt-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap: 6px;
  padding: 16px 8px;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  position: relative;
  overflow: hidden;
  user-select: none;
}

.opt-btn::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
  opacity:0; transition:opacity 0.2s;
}

.opt-btn:hover { border-color: var(--border-bright); transform: translateY(-2px); }
.opt-btn:hover::after { opacity:1; }

.opt-btn.selected {
  border-color: rgba(200,169,110,0.5);
  background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.05));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(200,169,110,0.12);
}

.opt-label {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  transition: color 0.2s;
}
.opt-btn.selected .opt-label { color: var(--accent); }

.opt-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--border-bright);
  display:flex; align-items:center; justify-content:center;
  transition: all 0.2s;
}
.opt-btn.selected .opt-dot {
  border-color: var(--accent);
  background: var(--accent);
}
.opt-dot svg { display:none; }
.opt-btn.selected .opt-dot svg { display:block; }

.opt-score {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-ui);
  font-weight: 500;
}

/* Nav buttons */
.q-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding: 20px 28px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.btn-group { display:flex; gap:8px; }

.btn {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 13px;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #b8943e);
  color: #0a0a0a;
  box-shadow: 0 4px 16px rgba(200,169,110,0.25);
}
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 6px 20px rgba(200,169,110,0.35); }
.btn-primary:disabled { opacity:0.3; cursor:not-allowed; transform:none; }

.btn-ghost {
  background: var(--surface3);
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background:var(--surface2); color:var(--text); border-color:var(--border-bright); }
.btn-ghost:disabled { opacity:0.3; cursor:not-allowed; }

.btn-danger {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(224,96,96,0.2);
}
.btn-danger:hover { background: rgba(224,96,96,0.2); }

/* ============ SCORE WIDGET ============ */
.score-widget {
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}

.score-widget-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom: 16px;
}

.score-label {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
}

.score-value {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--text);
}

.score-value span { font-size: 14px; color: var(--text-3); }

.score-bar-track {
  height: 8px;
  background: var(--surface3);
  border-radius: 99px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
}

/* ============ RESULT SCREEN ============ */
.result-screen {
  animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
}

.result-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 16px;
}

.result-hero-header {
  padding: 36px 32px;
  background: linear-gradient(135deg, var(--surface2), var(--surface));
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.result-hero-header::before {
  content:'';
  position:absolute; top:-60px; right:-60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow), transparent 70%);
  pointer-events: none;
}

.result-eyebrow {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.result-severity {
  font-family: var(--font-display);
  font-size: 36px;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 12px;
}

.result-advice {
  font-size: 15px;
  color: var(--text-2);
  line-height: 1.6;
}

.result-score-pill {
  display:inline-flex; align-items:center; gap:8px;
  margin-top: 20px;
  padding: 8px 16px;
  border-radius: 99px;
  background: var(--accent-dim);
  border: 1px solid rgba(200,169,110,0.2);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
}

.result-body {
  padding: 28px 32px;
}

.result-section-title {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
}

.steps-list {
  list-style: none;
  display:flex; flex-direction:column; gap:10px;
  margin-bottom: 24px;
}

.steps-list li {
  display:flex; align-items:flex-start; gap:10px;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.5;
}

.step-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--surface3);
  border: 1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  flex-shrink: 0;
  margin-top: 1px;
}

/* Severity visual bar */
.severity-scale {
  display:grid; grid-template-columns: repeat(4,1fr);
  gap:4px; margin-bottom: 24px;
}

.severity-seg {
  height: 6px; border-radius: 99px;
  opacity: 0.25; transition: opacity 0.3s;
}
.severity-seg.active { opacity:1; }
.severity-seg:nth-child(1) { background:#6eb5c8; }
.severity-seg:nth-child(2) { background:#8bc86e; }
.severity-seg:nth-child(3) { background:#c8b06e; }
.severity-seg:nth-child(4) { background:#e06060; }

.severity-labels {
  display:grid; grid-template-columns: repeat(4,1fr);
  gap:4px; margin-bottom: 20px;
}
.severity-labels span {
  font-size: 10px;
  font-family: var(--font-ui);
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Crisis box */
.crisis-box {
  padding: 18px 20px;
  border-radius: 14px;
  background: var(--danger-dim);
  border: 1px solid rgba(224,96,96,0.2);
  display:flex; gap:14px; align-items:flex-start;
  margin-top: 4px;
}

.crisis-icon {
  font-size: 20px; flex-shrink:0; margin-top:1px;
}

.crisis-text {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
}

.crisis-text strong { color: var(--danger); }

.crisis-links { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
.crisis-link {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  color: var(--danger);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(224,96,96,0.12);
  border: 1px solid rgba(224,96,96,0.2);
  transition: all 0.2s;
}
.crisis-link:hover { background: rgba(224,96,96,0.2); }

/* Results Chart */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
}

/* Result nav */
.result-actions {
  display:flex; gap:10px; flex-wrap:wrap;
  padding: 20px 32px;
  border-top: 1px solid var(--border);
}

/* Disclaimer */
.disclaimer {
  margin-top: 16px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.6;
  display:flex; gap:10px;
}

/* Footer */
footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
}

.footer-left {
  font-size: 12px;
  color: var(--text-3);
}

.footer-brand {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.04em;
}

/* Tooltip-like scale legend */
.scale-legend {
  display:flex; gap:6px; flex-wrap:wrap;
  margin-bottom: 20px;
}

.scale-pill {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--text-3);
  background: var(--surface2);
  letter-spacing: 0.04em;
}

/* Transition animation */
.fade-in {
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

/* Key press indicator */
.key-hint {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-3);
  display:flex; align-items:center; gap:6px;
}
.key {
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  background: var(--surface3);
}

/* SVG check */
.check-icon { fill:none; stroke:#0a0a0a; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="app-wrapper">

  <header>
    <div class="logo-group">
      <div class="logo-mark">S</div>
      <div>
        <div class="logo-text">Selfscreen</div>
        <div class="logo-sub">Mental Clarity</div>
      </div>
    </div>
    <div class="header-badge">Anonym · Kostenlos</div>
  </header>

  <div class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-label">Tests</div>
      <div id="sidebar-nav"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-info">
        Anonyme Selbsteinschätzung. Kein Ersatz für professionelle Beratung. Bei akuter Krise sofort Hilfe holen.
      </div>
    </aside>

    <!-- MOBILE TABS -->
    <div class="sidebar-mobile" id="mobile-tabs"></div>

    <!-- MAIN -->
    <main class="content-area" id="content"></main>

  </div>

  <footer>
    <div class="footer-left">Skala: Nie (0) · Selten (1) · Manchmal (2) · Oft (3)</div>
    <div class="footer-brand">© Selfscreen · Made with care</div>
  </footer>

</div>

<script>

  answers: {
    social: new Array(50).fill(null),

// =================== RENDER SIDEBAR ===================
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const mob = document.getElementById('mobile-tabs');
  nav.innerHTML = '';
  mob.innerHTML = '';

  Object.values(TESTS).forEach(t => {
    const filled = state.answers[t.id].filter(a => a !== null).length;
    const pct = Math.round((filled / t.questions.length) * 100);
    const isActive = state.currentTest === t.id;

    // Progress ring SVG
    const r = 10, cx = 14, cy = 14, circ = 2 * Math.PI * r;
    const dash = (pct / 100) * circ;
    const ring = `<svg class="nav-progress-ring" viewBox="0 0 28 28"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${t.color}" stroke-width="2" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ * 0.25}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/></svg>`;

    const item = document.createElement('div');
    item.className = 'nav-item' + (isActive ? ' active' : '');
    item.innerHTML = `
      <div class="nav-icon">${t.icon}</div>
      <div class="nav-info">
        <div class="nav-name">${t.name}</div>
        <div class="nav-count">${filled}/${t.questions.length} beantwortet</div>
      </div>
      ${ring}
    `;
    item.addEventListener('click', () => { state.currentTest = t.id; state.showResult = false; renderAll(); });
    nav.appendChild(item);

    // Mobile
    const mob_item = document.createElement('div');
    mob_item.className = 'mob-tab' + (isActive ? ' active' : '');
    mob_item.innerHTML = `${t.icon} ${t.name}`;
    mob_item.addEventListener('click', () => { state.currentTest = t.id; state.showResult = false; renderAll(); });
    mob.appendChild(mob_item);
  });
}

// =================== RENDER QUESTION ===================
function renderQuestion() {
  const t = TESTS[state.currentTest];
  const idx = state.index;
  const q = t.questions[idx];
  const chosen = state.answers[state.currentTest][idx];
  const filled = state.answers[state.currentTest].filter(a => a !== null).length;
  const pct = Math.round((filled / t.questions.length) * 100);
  const score = state.answers[state.currentTest].map(a => a === null ? 0 : a).reduce((s,a)=>s+a,0);
  const max = t.questions.length * 3;
  const scorePct = Math.round((score / max) * 100);

  const labels = ['Nie','Selten','Manchmal','Oft'];

  document.getElementById('content').innerHTML = `
    <div class="q-card">
      <div class="q-card-header">
        <div class="q-meta">
          <div class="q-test-name">${t.name}</div>
          <div class="q-pos">${idx+1} <span>/ ${t.questions.length}</span></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="key-hint"><span class="key">1</span><span class="key">2</span><span class="key">3</span><span class="key">4</span> wählen · <span class="key">→</span> weiter</div>
          <div style="font-size:12px;color:var(--text-3);font-family:var(--font-ui)">${pct}% ausgefüllt</div>
        </div>
      </div>
      <div class="q-card-body">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="scale-legend">
          ${labels.map((l,i)=>`<div class="scale-pill">${i} — ${l}</div>`).join('')}
        </div>
        <div class="q-text">${q}</div>
        <div class="options-grid">
          ${labels.map((label,i) => `
            <div class="opt-btn${chosen===i?' selected':''}" data-val="${i}" tabindex="0" role="radio" aria-checked="${chosen===i}">
              <div class="opt-dot">
                <svg width="10" height="8" viewBox="0 0 10 8" class="check-icon"><polyline points="1 4 4 7 9 1"/></svg>
              </div>
              <div class="opt-label">${label}</div>
              <div class="opt-score">${i} Pkt</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="q-nav">
        <div class="btn-group">
          <button class="btn btn-danger" id="btn-reset">↺ Reset</button>
        </div>
        <div class="btn-group">
          <button class="btn btn-ghost" id="btn-prev" ${idx===0?'disabled':''}>← Zurück</button>
          ${idx < t.questions.length - 1
            ? `<button class="btn btn-primary" id="btn-next">Weiter →</button>`
            : `<button class="btn btn-primary" id="btn-finish">Auswertung →</button>`
          }
        </div>
      </div>
    </div>

    <div class="score-widget">
      <div class="score-widget-header">
        <div class="score-label">Live-Score</div>
        <div class="score-value">${score} <span>/ ${max}</span></div>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:${scorePct}%;background:${t.color}"></div>
      </div>
    </div>

    <div class="disclaimer">
      <span style="font-size:16px;flex-shrink:0">ℹ️</span>
      <span>Diese Auswertung ist keine klinische Diagnose und ersetzt keinen Arztbesuch oder eine professionelle Beratung.</span>
    </div>
  `;

  // Events
  document.querySelectorAll('.opt-btn').forEach(el => {
    el.addEventListener('click', () => {
      state.answers[state.currentTest][idx] = Number(el.dataset.val);
      if(idx < t.questions.length - 1) {
        state.index++;
      }
      renderAll();
    });
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){el.click();e.preventDefault();} });
  });

  document.getElementById('btn-prev').addEventListener('click', () => { if(state.index>0){state.index--;renderAll();} });
  const btnNext = document.getElementById('btn-next');
  if(btnNext) btnNext.addEventListener('click', () => { state.index++; renderAll(); });
  const btnFinish = document.getElementById('btn-finish');
  if(btnFinish) btnFinish.addEventListener('click', () => {
    const missing = state.answers[state.currentTest].filter(a=>a===null).length;
    if(missing>0 && !confirm(`Noch ${missing} Frage(n) unbeantwortet. Trotzdem auswerten?`)) return;
    state.showResult = true; renderAll();
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    if(confirm('Test zurücksetzen?')) {
      state.answers[state.currentTest] = new Array(t.questions.length).fill(null);
      state.index = 0;
      renderAll();
    }
  });

  // Keyboard shortcuts
  document.onkeydown = e => {
    if(['1','2','3','4'].includes(e.key)) {
      state.answers[state.currentTest][idx] = Number(e.key)-1;
      if(idx < t.questions.length - 1) state.index++;
      renderAll();
    }
    if(e.key==='ArrowRight'&&idx<t.questions.length-1) { state.index++; renderAll(); }
    if(e.key==='ArrowLeft'&&idx>0) { state.index--; renderAll(); }
  };
}

// =================== RENDER RESULT ===================
function renderResult() {
  document.onkeydown = null;
  const t = TESTS[state.currentTest];
  const answers = state.answers[state.currentTest];
  const score = answers.map(a=>a===null?0:a).reduce((s,a)=>s+a,0);
  const max = t.questions.length * 3;
  const pct = Math.round((score/max)*100);

  let thresh = t.thresholds[t.thresholds.length-1];
  for(const th of t.thresholds) { if(score <= th.max){ thresh = th; break; } }

  const levelColors = ['#6eb5c8','#8bc86e','#c8b06e','#e06060'];
  const levelLabels = ['Gering','Leicht','Mässig','Ausgeprägt'];

  document.getElementById('content').innerHTML = `
    <div class="result-screen">
      <div class="result-hero">
        <div class="result-hero-header">
          <div class="result-eyebrow">${t.icon} ${t.name} — Ergebnis</div>
          <div class="result-severity">${thresh.label}</div>
          <div class="result-advice">${thresh.advice}</div>
          <div class="result-score-pill">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="${t.color}" stroke-width="1.5"/><path d="M4 7l2 2 4-4" stroke="${t.color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Score: ${score} / ${max} Punkte (${pct}%)
          </div>
        </div>
        <div class="result-body">
          <div class="result-section-title">Schweregrad</div>
          <div class="severity-scale">
            ${[0,1,2,3].map(i=>`<div class="severity-seg${thresh.level===i?' active':''}" style="${thresh.level===i?'':''}background:${levelColors[i]}"></div>`).join('')}
          </div>
          <div class="severity-labels">
            ${levelLabels.map(l=>`<span>${l}</span>`).join('')}
          </div>

          <div class="result-section-title">Nächste Schritte</div>
          <ul class="steps-list">
            ${STEPS.map((s,i)=>`<li><div class="step-num">${i+1}</div><span>${s}</span></li>`).join('')}
          </ul>
        </div>
        <div style="padding:0 32px 24px">
          <div class="crisis-box">
            <div class="crisis-icon">🆘</div>
            <div>
              <div class="crisis-text"><strong>Akute Krise?</strong> Du musst das nicht alleine durchstehen. Ruf jetzt an.</div>
              <div class="crisis-links">
                <a class="crisis-link" href="tel:0800111 0111">Telefonseelsorge: 0800 111 0 111</a>
                <a class="crisis-link" href="tel:112">Notruf: 112</a>
                <a class="crisis-link" href="https://www.telefonseelsorge.de" target="_blank">telefonseelsorge.de ↗</a>
              </div>
            </div>
          </div>
        </div>
        <div class="result-actions">
          <button class="btn btn-primary" id="r-back">← Zurück zum Test</button>
          <button class="btn btn-ghost" id="r-restart">Nochmals starten</button>
        </div>
      </div>

      <div class="chart-card">
        <div class="result-section-title" style="margin-bottom:16px">Punkteverteilung</div>
        <canvas id="resultChart" height="80"></canvas>
      </div>

      <div class="disclaimer">
        <span style="font-size:16px;flex-shrink:0">⚠️</span>
        <span><strong style="color:var(--text-2)">Wichtig:</strong> Dieses Screening ersetzt keine professionelle Diagnose. Bitte wende dich an einen Arzt oder Psychotherapeuten für eine vollständige Beurteilung deiner Situation.</span>
      </div>
    </div>
  `;

  // Chart
  const ctx = document.getElementById('resultChart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Dein Score','Verbleibend'],
      datasets:[{
        data: [score, max-score],
        backgroundColor: [t.color, 'rgba(255,255,255,0.04)'],
        borderWidth: 0,
        borderRadius: 4
      }]
    },
    options:{
      cutout: '75%',
      responsive:true,
      animation: { animateRotate:true, duration:800 },
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            label: ctx => ` ${ctx.label}: ${ctx.raw} Punkte`
          }
        }
      }
    }
  });

  document.getElementById('r-back').addEventListener('click', () => { state.showResult=false; renderAll(); });
  document.getElementById('r-restart').addEventListener('click', () => {
    state.answers[state.currentTest] = new Array(TESTS[state.currentTest].questions.length).fill(null);
    state.index = 0; state.showResult = false; renderAll();
  });
}

// =================== MAIN RENDER ===================
function renderAll() {
  renderSidebar();
  if(state.showResult) {
    renderResult();
  } else {
    renderQuestion();
  }
}

renderAll();
</script>
</body>
</html>
